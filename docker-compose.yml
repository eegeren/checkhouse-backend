services:
  postgres:
    image: postgres:16-alpine
    container_name: checkhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: checkhouse
      POSTGRES_PASSWORD: checkhouse
      POSTGRES_DB: checkhouse
    ports:
      - "5432:5432"
    volumes:
      - checkhouse-postgres:/var/lib/postgresql/data

volumes:
  checkhouse-postgres:
